<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiecos - Roblox Style</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: white; pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Wiecos Alpha</h1>
        <p>Мишка: Наблизити/Віддалити (Zoom)</p>
        <p>Клавіша V: Зміна виду | WASD: Рух</p>
    </div>

    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
    
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./js/engine.js"></script>
</body>
</html>
